
services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: forexguard_rabbit
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672  guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: forexguard_pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: forexguard
      POSTGRES_PASSWORD: forexguard
      POSTGRES_DB: forexguard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forexguard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: